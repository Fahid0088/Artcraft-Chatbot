<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtCraft Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 230, 213, 0.9), transparent 35%),
                linear-gradient(135deg, #f7f1e8, #e5eef6 45%, #f0e4d6);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .chat-container {
            width: min(760px, 100%);
            height: min(900px, 92vh);
            background: rgba(255, 255, 255, 0.96);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(82, 53, 31, 0.16);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(142, 102, 67, 0.12);
        }

        .chat-header {
            background: linear-gradient(135deg, #8a4b2b, #c67d32);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .chat-header h2 { font-size: 20px; }

        .header-right {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .mode-btn,
        .reset-btn {
            border-radius: 999px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .mode-btn {
            background: rgba(255, 255, 255, 0.14);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.55);
            padding: 8px 14px;
        }

        .mode-btn.active {
            background: #fff8ef;
            color: #8a4b2b;
            font-weight: 700;
        }

        .reset-btn {
            background: #fff8ef;
            color: #8a4b2b;
            border: none;
            padding: 9px 15px;
            font-weight: 700;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.75), rgba(249,244,238,0.95)),
                repeating-linear-gradient(
                    135deg,
                    rgba(198, 125, 50, 0.02) 0,
                    rgba(198, 125, 50, 0.02) 12px,
                    rgba(138, 75, 43, 0.03) 12px,
                    rgba(138, 75, 43, 0.03) 24px
                );
        }

        .message {
            max-width: 78%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            animation: fadeIn 0.25s ease;
            white-space: pre-wrap;
            word-break: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background: linear-gradient(135deg, #8a4b2b, #c67d32);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }

        .bot-message {
            background: #fff7ef;
            color: #35241a;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            border-left: 4px solid #c67d32;
        }

        .typing {
            background: #fff7ef;
            align-self: flex-start;
            padding: 12px 16px;
            border-radius: 18px;
            color: #8b6d56;
            font-style: italic;
            border-left: 4px solid #c67d32;
        }

        .chat-input {
            padding: 15px;
            border-top: 1px solid #eee3d8;
            display: flex;
            gap: 10px;
            background: #fffdfa;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #dfd1c2;
            border-radius: 999px;
            outline: none;
            font-size: 14px;
            transition: border 0.2s ease;
        }

        .chat-input input:focus { border-color: #c67d32; }

        .send-btn {
            background: linear-gradient(135deg, #8a4b2b, #c67d32);
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
        }

        .send-btn:hover { opacity: 0.94; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .voice-area {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 12px;
            border-top: 1px solid #eee3d8;
            background: #fffdfa;
        }

        .voice-area.active { display: flex; }

        .mic-btn {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8a4b2b, #c67d32);
            color: white;
            border: none;
            font-size: 28px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.12s ease;
            box-shadow: 0 12px 28px rgba(138, 75, 43, 0.22);
        }

        .mic-btn:active { transform: scale(0.96); }

        .mic-btn.recording {
            background: linear-gradient(135deg, #c44131, #e8684c);
            animation: pulse 1s infinite;
            box-shadow: 0 12px 28px rgba(196, 65, 49, 0.28);
        }

        .mic-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .voice-hint {
            font-size: 12px;
            color: #8b6d56;
        }

        .voice-status {
            font-size: 13px;
            color: #8a4b2b;
            font-weight: 700;
            min-height: 18px;
        }

        .status {
            text-align: center;
            font-size: 12px;
            color: #8b6d56;
            padding: 6px;
            background: #fffdfa;
            border-top: 1px solid rgba(223, 209, 194, 0.7);
            border-bottom: 1px solid rgba(223, 209, 194, 0.7);
        }

        .status.connected { color: #24734a; }
        .status.disconnected { color: #ba3c2d; }

        @media (max-width: 700px) {
            .chat-container { height: 94vh; }
            .chat-header { align-items: flex-start; flex-direction: column; }
            .header-right { width: 100%; justify-content: flex-start; }
            .message { max-width: 88%; }
            .chat-input { flex-direction: column; }
            .send-btn { width: 100%; }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h2>ArtCraft Assistant</h2>
        <div class="header-right">
            <button class="mode-btn active" id="textModeBtn" onclick="switchMode('text')">Text</button>
            <button class="mode-btn" id="voiceModeBtn" onclick="switchMode('voice')">Voice</button>
            <button class="reset-btn" onclick="resetChat()">New Chat</button>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="message bot-message">Welcome to ArtCraft. I can help with art supplies, prices, store policies, and orders.</div>
    </div>

    <div class="status disconnected" id="status">Connecting...</div>

    <div class="chat-input" id="textInput">
        <input
            type="text"
            id="userInput"
            placeholder="Ask about art supplies..."
            onkeypress="handleKeyPress(event)"
        />
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

    <div class="voice-area" id="voiceInput">
        <button
            class="mic-btn"
            id="micBtn"
            onmousedown="startRecording()"
            onmouseup="stopRecording()"
            onmouseleave="stopRecording()"
            ontouchstart="startRecording()"
            ontouchend="stopRecording()"
        >Mic</button>
        <div class="voice-status" id="voiceStatus"></div>
        <div class="voice-hint">Hold to speak. Release to send.</div>
    </div>
</div>

<script>
    const baseProtocol = window.location.protocol === "https:" ? "wss" : "ws";
    const baseHost = window.location.hostname || "localhost";
    const basePort = window.location.port || "8000";
    const socketBaseUrl = `${baseProtocol}://${baseHost}:${basePort}`;

    let ws = null;
    let voiceWs = null;
    let currentBotMessage = null;
    let currentVoiceMessage = null;
    let reconnectTimer = null;

    let micStream = null;
    let audioContext = null;
    let mediaSource = null;
    let processorNode = null;
    let recordingBuffers = [];
    let recordingSampleRate = 16000;
    let isRecording = false;

    let audioQueue = [];
    let isPlayingAudio = false;
    let speechQueue = [];
    let isSpeakingFallback = false;

    connectTextSocket();
    connectVoiceSocket();
    initMic();

    function connectTextSocket() {
        ws = new WebSocket(`${socketBaseUrl}/ws/chat`);

        ws.onopen = function() {
            updateStatus("Connected to ArtCraft server", true);
        };

        ws.onclose = function() {
            updateStatus("Disconnected. Reconnecting...", false);
            scheduleReconnect();
        };

        ws.onerror = function() {
            updateStatus("Connection error. Reconnecting...", false);
        };

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);

            if (data.type === "start") {
                removeTypingIndicator();
                currentBotMessage = addMessage("", "bot");
            } else if (data.type === "token") {
                if (currentBotMessage) {
                    currentBotMessage.textContent += data.message;
                    scrollToBottom();
                }
            } else if (data.type === "end") {
                currentBotMessage = null;
                enableInput();
            } else if (data.type === "reset") {
                clearMessages();
                addMessage("Chat reset. How can I help you with art supplies?", "bot");
                enableInput();
            } else if (data.type === "error") {
                removeTypingIndicator();
                addMessage(data.message, "bot");
                enableInput();
            }
        };
    }

    function connectVoiceSocket() {
        voiceWs = new WebSocket(`${socketBaseUrl}/ws/voice`);
        voiceWs.binaryType = "blob";

        voiceWs.onclose = function() {
            if (!reconnectTimer) {
                scheduleReconnect();
            }
        };

        voiceWs.onmessage = async function(event) {
            if (event.data instanceof Blob) {
                audioQueue.push(event.data);
                if (!isPlayingAudio) {
                    playNextAudio();
                }
                return;
            }

            const data = JSON.parse(event.data);

            if (data.type === "transcription") {
                addMessage(data.text, "user");
                document.getElementById("voiceStatus").textContent = "Thinking...";
            } else if (data.type === "voice_start") {
                currentVoiceMessage = addMessage("", "bot");
            } else if (data.type === "voice_token") {
                if (currentVoiceMessage) {
                    currentVoiceMessage.textContent += data.message;
                    scrollToBottom();
                }
            } else if (data.type === "status") {
                document.getElementById("voiceStatus").textContent = data.message;
            } else if (data.type === "sentence") {
                document.getElementById("voiceStatus").textContent = "Speaking...";
                if (!data.audio) {
                    queueBrowserSpeech(data.text);
                }
            } else if (data.type === "voice_end") {
                currentVoiceMessage = null;
                document.getElementById("voiceStatus").textContent = "";
                document.getElementById("micBtn").disabled = false;
            } else if (data.type === "error") {
                currentVoiceMessage = null;
                document.getElementById("voiceStatus").textContent = data.message;
                document.getElementById("micBtn").disabled = false;
                addMessage(data.message, "bot");
            }
        };
    }

    function scheduleReconnect() {
        if (reconnectTimer) {
            return;
        }

        reconnectTimer = window.setTimeout(() => {
            reconnectTimer = null;
            if (!ws || ws.readyState === WebSocket.CLOSED) {
                connectTextSocket();
            }
            if (!voiceWs || voiceWs.readyState === WebSocket.CLOSED) {
                connectVoiceSocket();
            }
        }, 1500);
    }

    function updateStatus(message, connected) {
        const status = document.getElementById("status");
        status.textContent = message;
        status.className = connected ? "status connected" : "status disconnected";
    }

    async function initMic() {
        try {
            micStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    channelCount: 1,
                    noiseSuppression: true,
                    echoCancellation: true
                }
            });
        } catch (error) {
            document.getElementById("voiceStatus").textContent = "Microphone access not available.";
        }
    }

    async function startRecording() {
        if (isRecording) {
            return;
        }
        if (!micStream) {
            await initMic();
        }
        if (!micStream) {
            alert("Microphone not available.");
            return;
        }
        if (!voiceWs || voiceWs.readyState !== WebSocket.OPEN) {
            document.getElementById("voiceStatus").textContent = "Voice server is not connected.";
            return;
        }

        audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        recordingSampleRate = audioContext.sampleRate;
        mediaSource = audioContext.createMediaStreamSource(micStream);
        processorNode = audioContext.createScriptProcessor(4096, 1, 1);
        recordingBuffers = [];

        processorNode.onaudioprocess = function(event) {
            const channelData = event.inputBuffer.getChannelData(0);
            recordingBuffers.push(new Float32Array(channelData));
        };

        mediaSource.connect(processorNode);
        processorNode.connect(audioContext.destination);

        isRecording = true;
        const micBtn = document.getElementById("micBtn");
        micBtn.textContent = "Stop";
        micBtn.classList.add("recording");
        document.getElementById("voiceStatus").textContent = "Listening...";
    }

    async function stopRecording() {
        if (!isRecording) {
            return;
        }
        isRecording = false;

        const micBtn = document.getElementById("micBtn");
        micBtn.textContent = "Mic";
        micBtn.classList.remove("recording");
        micBtn.disabled = true;
        document.getElementById("voiceStatus").textContent = "Processing...";

        processorNode.disconnect();
        mediaSource.disconnect();
        await audioContext.close();

        const wavBlob = encodeWav(recordingBuffers, recordingSampleRate);
        const arrayBuffer = await wavBlob.arrayBuffer();
        voiceWs.send(arrayBuffer);
    }

    function mergeBuffers(buffers) {
        const totalLength = buffers.reduce((sum, current) => sum + current.length, 0);
        const result = new Float32Array(totalLength);
        let offset = 0;

        for (const buffer of buffers) {
            result.set(buffer, offset);
            offset += buffer.length;
        }
        return result;
    }

    function downsampleBuffer(buffer, inputSampleRate, outputSampleRate) {
        if (outputSampleRate >= inputSampleRate) {
            return buffer;
        }

        const sampleRateRatio = inputSampleRate / outputSampleRate;
        const newLength = Math.round(buffer.length / sampleRateRatio);
        const result = new Float32Array(newLength);
        let offsetResult = 0;
        let offsetBuffer = 0;

        while (offsetResult < result.length) {
            const nextOffsetBuffer = Math.round((offsetResult + 1) * sampleRateRatio);
            let accum = 0;
            let count = 0;

            for (let i = offsetBuffer; i < nextOffsetBuffer && i < buffer.length; i++) {
                accum += buffer[i];
                count += 1;
            }

            result[offsetResult] = count > 0 ? accum / count : 0;
            offsetResult += 1;
            offsetBuffer = nextOffsetBuffer;
        }

        return result;
    }

    function encodeWav(buffers, sampleRate) {
        const rawSamples = mergeBuffers(buffers);
        const outputSampleRate = 16000;
        const samples = downsampleBuffer(rawSamples, sampleRate, outputSampleRate);
        const wavBuffer = new ArrayBuffer(44 + samples.length * 2);
        const view = new DataView(wavBuffer);

        writeString(view, 0, "RIFF");
        view.setUint32(4, 36 + samples.length * 2, true);
        writeString(view, 8, "WAVE");
        writeString(view, 12, "fmt ");
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, outputSampleRate, true);
        view.setUint32(28, outputSampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeString(view, 36, "data");
        view.setUint32(40, samples.length * 2, true);

        let offset = 44;
        for (let i = 0; i < samples.length; i++) {
            const sample = Math.max(-1, Math.min(1, samples[i]));
            view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7fff, true);
            offset += 2;
        }

        return new Blob([view], { type: "audio/wav" });
    }

    function writeString(view, offset, text) {
        for (let i = 0; i < text.length; i++) {
            view.setUint8(offset + i, text.charCodeAt(i));
        }
    }

    async function playNextAudio() {
        if (audioQueue.length === 0) {
            isPlayingAudio = false;
            return;
        }

        isPlayingAudio = true;
        const audioBlob = audioQueue.shift();
        const audioUrl = URL.createObjectURL(audioBlob);
        const audio = new Audio(audioUrl);

        audio.onended = function() {
            URL.revokeObjectURL(audioUrl);
            playNextAudio();
        };

        audio.onerror = function() {
            URL.revokeObjectURL(audioUrl);
            playNextAudio();
        };

        try {
            await audio.play();
        } catch (error) {
            URL.revokeObjectURL(audioUrl);
            isPlayingAudio = false;
            document.getElementById("voiceStatus").textContent = "Audio playback was blocked by the browser.";
        }
    }

    function queueBrowserSpeech(text) {
        if (!("speechSynthesis" in window)) {
            return;
        }
        speechQueue.push(text);
        if (!isSpeakingFallback) {
            playNextBrowserSpeech();
        }
    }

    function playNextBrowserSpeech() {
        if (speechQueue.length === 0) {
            isSpeakingFallback = false;
            return;
        }

        isSpeakingFallback = true;
        const utterance = new SpeechSynthesisUtterance(speechQueue.shift());
        utterance.rate = 1;
        utterance.pitch = 1;
        utterance.onend = playNextBrowserSpeech;
        utterance.onerror = playNextBrowserSpeech;
        window.speechSynthesis.speak(utterance);
    }

    function switchMode(mode) {
        if (mode === "text") {
            document.getElementById("textInput").style.display = "flex";
            document.getElementById("voiceInput").classList.remove("active");
            document.getElementById("textModeBtn").classList.add("active");
            document.getElementById("voiceModeBtn").classList.remove("active");
        } else {
            document.getElementById("textInput").style.display = "none";
            document.getElementById("voiceInput").classList.add("active");
            document.getElementById("voiceModeBtn").classList.add("active");
            document.getElementById("textModeBtn").classList.remove("active");
        }
    }

    function sendMessage() {
        const input = document.getElementById("userInput");
        const message = input.value.trim();
        if (!message) {
            return;
        }
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            addMessage("The chat server is not connected yet. Please wait a moment and try again.", "bot");
            return;
        }

        addMessage(message, "user");
        showTypingIndicator();
        ws.send(JSON.stringify({ message }));
        input.value = "";
        disableInput();
    }

    function resetChat() {
        clearMessages();
        addMessage("Chat reset. How can I help you with art supplies?", "bot");
        audioQueue = [];
        speechQueue = [];
        if ("speechSynthesis" in window) {
            window.speechSynthesis.cancel();
        }

        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ message: "/reset" }));
        }
        document.getElementById("voiceStatus").textContent = "";
        enableInput();
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    }

    function addMessage(text, sender) {
        const messagesDiv = document.getElementById("chatMessages");
        const div = document.createElement("div");
        div.className = `message ${sender}-message`;
        div.textContent = text;
        messagesDiv.appendChild(div);
        scrollToBottom();
        return div;
    }

    function showTypingIndicator() {
        removeTypingIndicator();
        const messagesDiv = document.getElementById("chatMessages");
        const typing = document.createElement("div");
        typing.className = "typing";
        typing.id = "typingIndicator";
        typing.textContent = "ArtCraft Assistant is typing...";
        messagesDiv.appendChild(typing);
        scrollToBottom();
    }

    function removeTypingIndicator() {
        const typing = document.getElementById("typingIndicator");
        if (typing) {
            typing.remove();
        }
    }

    function clearMessages() {
        document.getElementById("chatMessages").innerHTML = "";
    }

    function scrollToBottom() {
        const messagesDiv = document.getElementById("chatMessages");
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function disableInput() {
        document.getElementById("userInput").disabled = true;
        document.getElementById("sendBtn").disabled = true;
    }

    function enableInput() {
        document.getElementById("userInput").disabled = false;
        document.getElementById("sendBtn").disabled = false;
        document.getElementById("userInput").focus();
    }
</script>

</body>
</html>
