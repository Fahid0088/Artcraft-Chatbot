<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtCraft Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 700px;
            height: 85vh;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #6c3483;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 { font-size: 18px; }

        .reset-btn {
            background: white;
            color: #6c3483;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .reset-btn:hover { background: #f0f0f0; }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.5;
        }

        .user-message {
            background: #6c3483;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            background: #f5eef8;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .typing {
            background: #f5eef8;
            align-self: flex-start;
            padding: 12px 16px;
            border-radius: 15px;
            color: #888;
            font-style: italic;
        }

        .chat-input {
            padding: 15px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }

        .chat-input input:focus { border-color: #6c3483; }

        .send-btn {
            background: #6c3483;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .send-btn:hover { background: #5b2c6f; }

        .status {
            text-align: center;
            font-size: 12px;
            color: #888;
            padding: 5px;
        }

        .status.connected { color: green; }

        .status.disconnected { color: red; }
    </style>
</head>
<body>

<div class="chat-container">

    <div class="chat-header">
        <h2>🎨 ArtCraft Assistant</h2>
        <button class="reset-btn" onclick="resetChat()">🔄 New Chat</button>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="message bot-message">
            👋 Welcome to ArtCraft! I'm your art supply assistant. 
            How can I help you today? 🎨
        </div>
    </div>

    <div class="status disconnected" id="status">Connecting...</div>

    <div class="chat-input">
        <input 
            type="text" 
            id="userInput" 
            placeholder="Ask about art supplies..." 
            onkeypress="handleKeyPress(event)"
        />
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
    // Connect to our FastAPI WebSocket server
    let ws = new WebSocket("ws://localhost:8000/ws/chat");

    // Current bot message element being streamed
    let currentBotMessage = null;

    // When WebSocket connects successfully
    ws.onopen = function() {
        document.getElementById("status").textContent = "🟢 Connected";
        document.getElementById("status").className = "status connected";
    };

    // When WebSocket disconnects
    ws.onclose = function() {
        document.getElementById("status").textContent = "🔴 Disconnected - Refresh page";
        document.getElementById("status").className = "status disconnected";
    };

    // When we receive a message from server
    ws.onmessage = function(event) {
        const data = JSON.parse(event.data);

        if (data.type === "start") {
            removeTypingIndicator();
            currentBotMessage = addMessage("", "bot");

        } else if (data.type === "token") {
            if (currentBotMessage) {
                currentBotMessage.textContent += data.message;
                scrollToBottom(); 
            }

        } else if (data.type === "end") {
            currentBotMessage = null;
            enableInput();  

        } else if (data.type === "reset") {
            clearMessages();
        }
    };

    // Send message to server
    function sendMessage() {
        const input = document.getElementById("userInput");
        const message = input.value.trim(); 

        if (!message) return;

        addMessage(message, "user");

        showTypingIndicator();

        ws.send(JSON.stringify({ message: message }));

        input.value = "";

        disableInput();
    }

    function resetChat() {
        ws.send(JSON.stringify({ message: "/reset" }));

        clearMessages();

        addMessage("👋 Chat reset! How can I help you with art supplies? 🎨", "bot");
    }

    function addMessage(text, sender) {
        const messagesDiv = document.getElementById("chatMessages");

        const messageDiv = document.createElement("div");
        messageDiv.className = `message ${sender}-message`;
        messageDiv.textContent = text;

        messagesDiv.appendChild(messageDiv);
        scrollToBottom();

        return messageDiv;  
    }

    // Show typing indicator while AI is thinking
    function showTypingIndicator() {
        const messagesDiv = document.getElementById("chatMessages");
        const typing = document.createElement("div");
        typing.className = "typing";
        typing.id = "typingIndicator";
        typing.textContent = "ArtCraft Assistant is typing...";
        messagesDiv.appendChild(typing);
        scrollToBottom();
    }

    // Remove typing indicator
    function removeTypingIndicator() {
        const typing = document.getElementById("typingIndicator");
        if (typing) typing.remove();
    }

    // Clear all messages from chat
    function clearMessages() {
        document.getElementById("chatMessages").innerHTML = "";
    }

    // Scroll chat to bottom
    function scrollToBottom() {
        const messagesDiv = document.getElementById("chatMessages");
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Disable input while AI is responding
    function disableInput() {
        document.getElementById("userInput").disabled = true;
        document.querySelector(".send-btn").disabled = true;
    }

    // Enable input after AI responds
    function enableInput() {
        document.getElementById("userInput").disabled = false;
        document.querySelector(".send-btn").disabled = false;
        document.getElementById("userInput").focus();
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") sendMessage();
    }
</script>

</body>
</html>
